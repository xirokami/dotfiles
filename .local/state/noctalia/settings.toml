[bar.default]
background_opacity = 0.4999999888241291
end = [ "tray", "spacer_2", "network", "bluetooth", "battery", "keyboard_layout", "notifications" ]
margin_edge = 0
margin_ends = 0
position = "left"
radius = 0
radius_top_left = 0
start = [ "taskbar" ]

[brightness]
enable_ddcutil = true

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@HDMI-A-1", "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1"]
    box_height = 0.0
    box_width = 0.0
    cx = 1280.0
    cy = 1317.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 0.0
    box_width = 0.0
    cx = 960.0
    cy = 957.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[nightlight]
enabled = true
force = true
temperature_night = 4600

[shell]
font_family = "JetBrains Mono NL"
polkit_agent = true
settings_show_advanced = true

    [shell.panel]
    transparency_mode = "glass"

    [shell.screen_corners]
    enabled = true
    size = 16

[theme]
builtin = "Kanagawa"
community_palette = "Tokyo Night Moon"
mode = "dark"

    [theme.templates]
    builtin_ids = [ "gtk3", "gtk4", "kcolorscheme", "kitty", "niri", "qt" ]
    community_ids = [ "neovim" ]

[wallpaper]
directory = "/home/xiro/Pictures/Wallpapers"

    [wallpaper.default]
    path = "/home/xiro/Pictures/Wallpapers/wallhaven-yqv2wx_1920x1080.png"

    [wallpaper.last]
    path = "/home/xiro/Pictures/Wallpapers/wallhaven-yqv2wx_1920x1080.png"

    [wallpaper.monitors.HDMI-A-1]
    path = "/home/xiro/Pictures/Wallpapers/wallhaven-4v9x35_2560x1440.png"

    [wallpaper.monitors.eDP-1]
    path = "/home/xiro/Pictures/Wallpapers/wallhaven-yqv2wx_1920x1080.png"

[widget.clock]
format = "{:%H:%M - %d %m}"

[widget.keyboard_layout]
scale = 1.1000000000000001
show_icon = false

    [widget.keyboard_layout.custom_labels]
    "English (US)" = "us"
    Russian = "ru"

[widget.spacer_2]
capsule_fill = "primary"
type = "spacer"

[widget.spacer_3]
length = 0
scale = 0.20000000000000001
type = "spacer"

[widget.taskbar]
group_by_workspace = true
hide_empty_workspaces = true
show_workspace_label = false